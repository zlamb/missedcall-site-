<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MissedCall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); color: white; text-align: center; padding: 2rem; }
    .hero h1 { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.02em; }
    .hero h1 span { color: #60a5fa; }
    .hero p { margin-top: 1rem; color: #64748b; font-size: 1rem; }
    @media (max-width: 640px) { .hero h1 { font-size: 2.5rem; } }
  </style>
</head>
<body>
  <div class="hero">
    <div>
      <h1>Missed<span>Call</span></h1>
      <p>Coming soon.</p>
    </div>
  </div>
</body>
</html>
